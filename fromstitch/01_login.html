<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .bg-brand-gradient {
            background: linear-gradient(135deg, #005bc1 0%, #3d89ff 100%);
        }
    </style>

<body class="bg-surface text-on-surface overflow-hidden">
<main class="flex min-h-screen w-full">
<!-- Left Panel: Branded Panel (40%) -->
<section class="hidden md:flex md:w-[40%] bg-brand-gradient flex-col justify-center px-16 relative overflow-hidden">
<!-- Decorative Subtle Pattern Overlay -->
<div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
<div class="relative z-10 space-y-8">
<div class="space-y-1">
<h1 class="text-white text-5xl font-extrabold tracking-tight">GenXcript</h1>
<p class="text-white/80 text-xs font-bold uppercase tracking-[0.3em]">PAYROLL SYSTEM</p>
</div>
<ul class="space-y-5">
<li class="flex items-center gap-3 text-white/90 font-medium">
<span class="material-symbols-outlined text-tertiary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Philippine-compliant
                    </li>
<li class="flex items-center gap-3 text-white/90 font-medium">
<span class="material-symbols-outlined text-tertiary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Multi-company
                    </li>
<li class="flex items-center gap-3 text-white/90 font-medium">
<span class="material-symbols-outlined text-tertiary-fixed" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Real-time payroll
                    </li>
</ul>
</div>
<!-- Decorative corner elements -->
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
</section>
<!-- Right Panel: Login Form (60%) -->
<section class="w-full md:w-[60%] flex items-center justify-center p-6 bg-surface-bright">
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-lg p-12 shadow-ambient">
<div class="mb-10 text-left">
<h2 class="text-[2rem] font-bold text-text-primary leading-tight mb-2">Welcome back!</h2>
<p class="text-text-secondary font-medium">Sign in to your account to continue.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-text-secondary px-6">Employee ID or Email</label>
<input class="w-full bg-[#ebeef0] border-0 rounded-full px-6 py-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none placeholder:text-slate-400" placeholder="e.g. GX-12345" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-text-secondary px-6">Password</label>
<div class="relative group">
<input class="w-full bg-[#ebeef0] border-0 rounded-full px-6 py-4 text-sm focus:ring-2 focus:ring-primary/20 transition-all outline-none placeholder:text-slate-400" placeholder="••••••••" type="password"/>
<button class="absolute right-6 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between px-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-0 bg-[#ebeef0] text-primary-container focus:ring-offset-0 focus:ring-transparent cursor-pointer" type="checkbox"/>
<span class="text-xs font-medium text-text-secondary group-hover:text-text-primary transition-colors">Remember me</span>
</label>
</div>
<button class="w-full bg-brand-gradient text-white font-bold py-4 rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8 flex flex-col items-center gap-8">
<button class="text-xs font-bold text-primary-container hover:opacity-70 transition-opacity">
                        Forgot your password?
                    </button>
<div class="w-full h-[1px] bg-[#ebeef0]"></div>
<div class="text-center">
<p class="text-[0.625rem] font-bold uppercase tracking-[0.2em] text-text-tertiary">
                            GenXcript Payroll System
                        </p>
</div>
</div>
</div>
</section>
</main>
</body></html>
