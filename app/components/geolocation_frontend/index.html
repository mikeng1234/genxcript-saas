<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; padding: 0; height: 0; overflow: hidden; }
  </style>
</head>
<body>
<script>
  // Streamlit 1.28+ uses raw postMessage — window.parent.Streamlit is undefined.
  // Protocol:
  //   Component → parent : {isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1}
  //   Parent    → component : {type:"streamlit:render", ...}
  //   Component → parent : {isStreamlitMessage:true, type:"streamlit:setComponentValue", value:..., dataType:"json"}

  var _rendered = false;

  function post(obj) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, obj), "*");
  }

  function sendValue(value) {
    post({ type: "streamlit:setComponentValue", dataType: "json", value: value });
  }

  // Keep sending componentReady until we get a render back (fixes race condition)
  post({ type: "streamlit:componentReady", apiVersion: 1 });
  var _retryReady = setInterval(function() {
    if (_rendered) { clearInterval(_retryReady); return; }
    post({ type: "streamlit:componentReady", apiVersion: 1 });
  }, 200);

  window.addEventListener("message", function(event) {
    if (!event.data || event.data.type !== "streamlit:render") return;
    if (_rendered) return;
    _rendered = true;
    clearInterval(_retryReady);

    // Set frame height to 0 (invisible component)
    post({ type: "streamlit:setFrameHeight", height: 0 });

    if (!navigator.geolocation) {
      sendValue({
        lat: null, lng: null, accuracy: null,
        error: "Geolocation is not supported by this browser."
      });
      return;
    }

    navigator.geolocation.getCurrentPosition(
      function(pos) {
        sendValue({
          lat:      pos.coords.latitude,
          lng:      pos.coords.longitude,
          accuracy: pos.coords.accuracy,
          error:    null
        });
      },
      function(err) {
        sendValue({ lat: null, lng: null, accuracy: null, error: err.message });
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });
</script>
</body>
</html>
