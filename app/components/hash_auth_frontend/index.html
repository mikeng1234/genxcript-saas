<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  function parseHash(hash) {
    if (!hash || hash.length < 2) return {};
    return hash.slice(1).split("&").reduce(function(obj, pair) {
      var parts = pair.split("=");
      obj[decodeURIComponent(parts[0])] = decodeURIComponent((parts[1] || "").replace(/\+/g, " "));
      return obj;
    }, {});
  }

  function sendResult() {
    try {
      // declare_component iframes are same-origin so we can read parent's hash
      var hash = window.parent.location.hash;
      var params = parseHash(hash);

      if (params.type === "recovery" && params.access_token) {
        window.parent.Streamlit.setComponentValue({
          type:         "recovery",
          access_token: params.access_token
        });
      } else if (params.error) {
        // e.g. otp_expired — tell Python so it can show a friendly message
        window.parent.Streamlit.setComponentValue({
          type:  "error",
          error: params.error,
          desc:  params.error_description || ""
        });
      } else {
        window.parent.Streamlit.setComponentValue(null);
      }
    } catch(e) {
      // Cross-origin guard — should not happen on localhost
      window.parent.Streamlit.setComponentValue(null);
    }
  }

  // Streamlit sends this event when the component iframe is ready
  window.addEventListener("message", function(event) {
    if (event.data && event.data.type === "streamlit:render") {
      sendResult();
    }
  });
</script>
</body>
</html>
