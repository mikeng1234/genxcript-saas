<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  // Run immediately — no need to wait for streamlit:render.
  // This iframe is same-origin so it can redirect the parent window.
  (function() {
    var hash = window.top.location.hash;
    if (!hash || hash.length < 2) return;

    // Parse hash into key/value pairs
    var params = {};
    hash.slice(1).split("&").forEach(function(pair) {
      var parts = pair.split("=");
      params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || "");
    });

    if (params.type === "recovery" && params.access_token) {
      // Move the token from hash → query param so Streamlit's server can read it.
      // We use short param names (_rec, _tok) to keep the URL tidy.
      window.top.location.replace(
        window.top.location.pathname +
        "?_rec=1&_tok=" + encodeURIComponent(params.access_token)
      );
    }
  })();
</script>
</body>
</html>
