<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>body { margin:0; padding:0; height:0; overflow:hidden; }</style>
</head>
<body>
<script>
  // In Streamlit 1.28+, window.parent.Streamlit does NOT exist.
  // Components communicate via raw postMessage with isStreamlitMessage:true.
  //
  // Protocol:
  //   Component → parent : {isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1}
  //   Parent    → component : {type:"streamlit:render", ...}
  //   Component → parent : {isStreamlitMessage:true, type:"streamlit:setComponentValue", value:..., dataType:"json"}
  //
  // Race condition: parent may not have its listener ready when the component
  // first sends componentReady. Fix: retry every 100 ms until render arrives.

  var _rendered = false;

  function post(obj) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true }, obj), "*");
  }

  function parseHash(hash) {
    if (!hash || hash.length < 2) return {};
    return hash.slice(1).split("&").reduce(function(obj, pair) {
      var parts = pair.split("=");
      obj[decodeURIComponent(parts[0])] = decodeURIComponent(
        (parts[1] || "").replace(/\+/g, " ")
      );
      return obj;
    }, {});
  }

  // Keep sending componentReady until we get a render back
  post({ type: "streamlit:componentReady", apiVersion: 1 });
  var _retryReady = setInterval(function() {
    if (_rendered) { clearInterval(_retryReady); return; }
    post({ type: "streamlit:componentReady", apiVersion: 1 });
  }, 200);

  window.addEventListener("message", function(event) {
    if (!event.data || event.data.type !== "streamlit:render") return;
    if (_rendered) return;
    _rendered = true;
    clearInterval(_retryReady);

    // Set frame height to 0 (invisible component)
    post({ type: "streamlit:setFrameHeight", height: 0 });

    // Read parent hash and return result
    var hash = "";
    try { hash = window.parent.location.hash; } catch(e) {}
    var params = parseHash(hash);

    if (params.type === "recovery" && params.access_token) {
      post({ type: "streamlit:setComponentValue", dataType: "json",
             value: { type: "recovery", access_token: params.access_token } });
    } else if (params.error) {
      post({ type: "streamlit:setComponentValue", dataType: "json",
             value: { type: "error", error: params.error,
                      desc: params.error_description || "" } });
    } else {
      post({ type: "streamlit:setComponentValue", dataType: "json", value: null });
    }
  });
</script>
</body>
</html>
