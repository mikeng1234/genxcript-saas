<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  var _sent = false;

  function parseHash(hash) {
    if (!hash || hash.length < 2) return {};
    return hash.slice(1).split("&").reduce(function(obj, pair) {
      var parts = pair.split("=");
      obj[decodeURIComponent(parts[0])] = decodeURIComponent((parts[1] || "").replace(/\+/g, " "));
      return obj;
    }, {});
  }

  function trySetValue(value) {
    // window.parent.Streamlit might not exist yet — this is called in a retry loop
    try {
      if (window.parent && window.parent.Streamlit && window.parent.Streamlit.setComponentValue) {
        window.parent.Streamlit.setComponentValue(value);
        return true;
      }
    } catch(e) { /* cross-origin guard, should not happen on same-origin */ }
    return false;
  }

  function computeResult() {
    try {
      var hash = window.parent.location.hash;
      var params = parseHash(hash);
      if (params.type === "recovery" && params.access_token) {
        return { type: "recovery", access_token: params.access_token };
      }
      if (params.error) {
        return { type: "error", error: params.error, desc: params.error_description || "" };
      }
    } catch(e) { /* cross-origin guard */ }
    return null;
  }

  function sendResult() {
    if (_sent) return;
    var result = computeResult();
    if (trySetValue(result)) {
      _sent = true;
    }
  }

  // Retry every 100 ms until window.parent.Streamlit is ready (max 10 s)
  var _tries = 0;
  var _timer = setInterval(function() {
    _tries++;
    sendResult();
    if (_sent || _tries > 100) clearInterval(_timer);
  }, 100);

  // Also fire on Streamlit's render event as primary trigger
  window.addEventListener("message", function(event) {
    if (event.data && event.data.type === "streamlit:render") {
      sendResult();
    }
  });
</script>
</body>
</html>
